name: Publish to NuGet
on:
  push:
    branches:
      - master

jobs:
  publish:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    environment: release
    env:
      VERSION: 1.0.${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore GribSharp.slnx
      - name: Build
        run: dotnet build GribSharp.slnx -c Release --no-restore -p:Version=${{ env.VERSION }}
      - name: Test
        run: dotnet test GribSharp.slnx -c Release --no-build
      - name: Extract release notes
        run: awk '/^## \[Unreleased\]/{f=1;next} /^## \[/{f=0} f' CHANGELOG.md > RELEASE_NOTES.txt
      - name: Pack
        run: dotnet pack GribSharp/GribSharp.csproj -c Release --no-build -o ./nupkg -p:Version=${{ env.VERSION }}
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate